name: Weekly OCNJ Business Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install monitor dependencies
        run: python -m pip install --upgrade requests beautifulsoup4

      - name: Check listed businesses and official directories
        run: python scripts/check_businesses.py

      - name: Commit updated monitoring files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/business-status.json data/discovered-listings.json reports/
          if git diff --cached --quiet; then
            echo "No monitoring changes to commit."
          else
            git commit -m "Update automated business monitoring report"
            git push
          fi

      - name: Create or update review issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Business monitor needs review"
          ISSUE_NUMBER="$(gh issue list \
            --search "\"${TITLE}\" in:title state:open" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -f reports/business-monitor-alert.md ]; then
            if [ -n "$ISSUE_NUMBER" ]; then
              gh issue edit "$ISSUE_NUMBER" \
                --title "$TITLE" \
                --body-file reports/business-monitor-alert.md
            else
              gh issue create \
                --title "$TITLE" \
                --body-file reports/business-monitor-alert.md
            fi
          elif [ -n "$ISSUE_NUMBER" ]; then
            gh issue close "$ISSUE_NUMBER" \
              --comment "The latest automated check found no current alerts."
          fi
